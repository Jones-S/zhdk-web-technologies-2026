<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Images</title>
  </head>
  <body>

    <!-- src — where the image lives (URL or relative path)  -->
    <!-- alt — shown if image fails to load, required for accessibility -->
    <img src="https://placehold.co/400x200" alt="A grey placeholder image" />

    <!-- width and height keep the layout stable while loading -->
    <img
      src="https://placehold.co/200x200"
      alt="A small square placeholder"
      width="200"
      height="200"
    />

    <!-- Image as a link — wrap img inside an a tag -->
    <a href="https://www.wikipedia.org">
      <img src="https://placehold.co/150x50" alt="Click me" />
    </a>

  </body>
</html>
